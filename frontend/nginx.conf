server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Reverse-proxy para os serviços (mesma origem → sem CORS).
    # A barra final no proxy_pass remove o prefixo /api/lanc|cons do caminho.
    location /api/lanc/ {
        proxy_pass http://lancamentos-api:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/cons/ {
        proxy_pass http://consolidado-api:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
