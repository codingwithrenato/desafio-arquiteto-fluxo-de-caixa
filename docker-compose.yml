name: fluxo-de-caixa

services:
  # ---------- Infraestrutura ----------
  # Um único servidor PostgreSQL hospeda os dois bancos (database-per-service lógico):
  # 'lancamentos' e 'consolidado' — bancos distintos, sem acesso cruzado. Em produção,
  # basta trocar o Host das connection strings para separar em instâncias dedicadas.
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: lancamentos
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_INITDB_ARGS: "--no-sync"
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./docker/postgres/init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lancamentos"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 40s

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"     # AMQP
      - "15672:15672"   # Management UI
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------- Serviço de Lançamentos ----------
  lancamentos-api:
    build:
      context: .
      dockerfile: src/Lancamentos/Lancamentos.API/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__LancamentosDb: "Host=postgres;Port=5432;Database=lancamentos;Username=postgres;Password=postgres"
      RabbitMq__HostName: rabbitmq
      RabbitMq__Port: "5672"
      RabbitMq__UserName: guest
      RabbitMq__Password: guest
      Jwt__SigningKey: "troque-esta-chave-em-producao-use-no-minimo-32-bytes!!"
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # ---------- Serviço de Consolidado ----------
  consolidado-api:
    build:
      context: .
      dockerfile: src/Consolidado/Consolidado.API/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__ConsolidadoDb: "Host=postgres;Port=5432;Database=consolidado;Username=postgres;Password=postgres"
      ConnectionStrings__Redis: "redis:6379"
      RabbitMq__HostName: rabbitmq
      Jwt__SigningKey: "troque-esta-chave-em-producao-use-no-minimo-32-bytes!!"
    ports:
      - "8082:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  consolidado-worker:
    build:
      context: .
      dockerfile: src/Consolidado/Consolidado.Worker/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__ConsolidadoDb: "Host=postgres;Port=5432;Database=consolidado;Username=postgres;Password=postgres"
      ConnectionStrings__HangfireDb: "Host=postgres;Port=5432;Database=consolidado;Username=postgres;Password=postgres"
      ConnectionStrings__Redis: "redis:6379"
      RabbitMq__HostName: rabbitmq
    ports:
      - "8083:8080"   # Dashboard do Hangfire em /hangfire
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      consolidado-api:
        condition: service_started

  # ---------- Frontend (console de testes) ----------
  # SPA Vue 3 servida por Nginx, que também faz reverse-proxy de /api/* para as APIs
  # (mesma origem → sem CORS, sem alteração nos serviços de backend).
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      - lancamentos-api
      - consolidado-api

volumes:
  pg-data:
